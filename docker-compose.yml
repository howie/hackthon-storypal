services:
  postgres:
    image: postgres:16-alpine
    container_name: storypal-postgres
    environment:
      POSTGRES_USER: storypal
      POSTGRES_PASSWORD: storypal_dev
      POSTGRES_MULTIPLE_DATABASES: storypal_dev,storypal_test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/create-multiple-databases.sh:/docker-entrypoint-initdb.d/create-multiple-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storypal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
